<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ Technique Journal</title>
<style>
  :root {
    --dark-blue: #1B3A5C;
    --med-blue: #2E75B6;
    --light-blue: #D6E4F0;
    --bg: #f7f8fa;
    --card-bg: #ffffff;
    --text: #333333;
    --muted: #666666;
    --border: #e0e0e0;
    --accent: #2E75B6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  header {
    background: var(--dark-blue);
    color: white;
    padding: 28px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    background: rgba(255,255,255,0.15);
    color: white;
    outline: none;
    transition: background 0.2s;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.55); }
  .search-box:focus { background: rgba(255,255,255,0.25); }

  .filter-btn {
    padding: 7px 14px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.1); color: white; }
  .filter-btn.active {
    background: var(--med-blue);
    border-color: var(--med-blue);
    color: white;
    font-weight: 600;
  }

  .stats {
    display: flex;
    gap: 20px;
    padding: 12px 32px;
    background: white;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }
  .stats span { font-weight: 600; color: var(--dark-blue); }

  main { max-width: 960px; margin: 0 auto; padding: 24px 20px 80px; }

  .position-section { margin-bottom: 32px; }

  .position-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 3px solid var(--med-blue);
    margin-bottom: 14px;
    cursor: pointer;
    user-select: none;
  }
  .position-header h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark-blue);
    flex: 1;
  }
  .position-header .count {
    background: var(--light-blue);
    color: var(--dark-blue);
    font-size: 12px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 12px;
  }
  .position-header .toggle-icon {
    color: var(--muted);
    font-size: 14px;
    transition: transform 0.2s;
  }
  .position-section.collapsed .toggle-icon { transform: rotate(-90deg); }
  .position-section.collapsed .move-list { display: none; }

  .move-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 10px;
    transition: box-shadow 0.2s;
  }
  .move-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .move-card .move-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--dark-blue);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .move-card .move-date {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  .move-card .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .move-card .detail {
    font-size: 13px;
  }
  .move-card .detail-label {
    font-weight: 600;
    color: var(--med-blue);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .move-card .detail-text { color: var(--text); }

  .move-card .detail.full-width { grid-column: 1 / -1; }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 15px;
  }

  .view-toggle {
    padding: 7px 14px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    margin-right: 4px;
  }
  .view-toggle:hover { background: rgba(255,255,255,0.1); color: white; }
  .view-toggle.active {
    background: #e8a030;
    border-color: #e8a030;
    color: white;
    font-weight: 600;
  }

  .move-card.compact { padding: 10px 20px; }
  .move-card.compact .move-name { margin-bottom: 4px; font-size: 15px; }
  .move-card.compact .quick-ref {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }

  .print-header { display: none; }

  @media print {
    header, .stats { position: static; }
    .search-box, .filter-btn { display: none; }
    .print-header { display: block; text-align: center; margin-bottom: 20px; }
    .move-card { break-inside: avoid; page-break-inside: avoid; }
    .position-section.collapsed .move-list { display: block !important; }
  }

  @media (max-width: 600px) {
    .move-card .detail-grid { grid-template-columns: 1fr; }
    header { padding: 16px; }
    header h1 { font-size: 18px; margin-bottom: 10px; }
    main { padding: 16px 12px; }
    .search-box { min-width: 0; }
    #filters {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      max-width: 100%;
      padding-bottom: 2px;
    }
    #filters::-webkit-scrollbar { display: none; }
    .filter-btn { font-size: 12px; padding: 5px 10px; flex-shrink: 0; }
  }
</style>
</head>
<body>

<header>
  <h1>BJJ TECHNIQUE JOURNAL</h1>
  <div class="controls">
    <button class="view-toggle" id="compactToggle" title="Quick review mode">Quick Review</button>
    <input type="text" class="search-box" id="search" placeholder="Search moves, tips, positions...">
    <div id="filters"></div>
  </div>
</header>

<div class="stats" id="stats"></div>

<main id="app"></main>
